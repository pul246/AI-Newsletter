<!-- Site header with navigation, theme toggle, and auth -->
<header class="site-header">
    <div class="header-container">
        <a href="/" class="logo-link">
            <h1 class="site-title">AI Pulse</h1>
        </a>
        <div class="header-actions">
            <nav class="main-nav">
                <a href="/" class="nav-link">Home</a>
                <a href="/archive" class="nav-link">Archive</a>
            </nav>
            <button class="theme-toggle" aria-label="Theme: Light">
                <span class="theme-icon">☀️</span>
                <span class="theme-label">Light</span>
            </button>
            <!-- Google login button (shown when logged out) -->
            <a id="auth-login-btn" href="/auth/login" class="auth-login-btn" style="display:inline-flex;">
                <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.34 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Login
            </a>
            <!-- Profile avatar (shown when logged in) -->
            <div id="auth-profile" class="auth-profile" style="display:none;">
                <button id="auth-avatar-btn" class="auth-avatar-btn" aria-label="Account menu">
                    <img id="auth-avatar-img" src="" alt="Profile" referrerpolicy="no-referrer" />
                </button>
                <div id="auth-dropdown" class="auth-dropdown">
                    <span id="auth-dropdown-email" class="auth-dropdown-email"></span>
                    <button id="auth-send-btn" class="auth-dropdown-item auth-dropdown-item--send" style="display:none;">Send Newsletter</button>
                    <button id="auth-logout-btn" class="auth-dropdown-item auth-dropdown-item--logout">Logout</button>
                </div>
            </div>
        </div>
    </div>
</header>
