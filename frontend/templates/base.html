<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>try{var t=localStorage.getItem('aipulse-theme');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){}</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Pulse — Your weekly curated briefing on AI trends, tools, and career opportunities.">
    <meta name="theme-color" content="#6366f1">
    <meta property="og:title" content="{% block og_title %}AI Pulse Newsletter{% endblock %}">
    <meta property="og:description" content="Weekly curated AI industry news, tools, and job opportunities.">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <title>{% block title %}AI Pulse Newsletter{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/reset.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/typography.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/sections.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/auth.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/chat.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include "partials/header.html" %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% include "partials/footer.html" %}

    {% include "partials/chat_widget.html" %}

    {% block extra_js %}{% endblock %}
    <script src="{{ url_for('static', path='/js/theme.js') }}"></script>
    <script src="{{ url_for('static', path='/js/auth.js') }}"></script>
    <script src="{{ url_for('static', path='/js/chat.js') }}"></script>
</body>
</html>
